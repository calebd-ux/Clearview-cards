<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Card - Piers Rodd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
            padding: 40px;
        }
        
        /* Standard business card: 3.5in x 2in */
        .card {
            width: 3.5in;
            height: 2in;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        /* === FRONT === */
        .card-front {
            background: #E20074;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }
        
        .photo-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.8);
            flex-shrink: 0;
        }
        
        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        
        .front-info {
            color: white;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .tmobile-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.95;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .tmobile-text .t-logo {
            font-weight: 900;
            font-size: 15px;
        }
        
        .front-name {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }
        
        .front-title {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.9;
            margin-top: 2px;
        }
        
        .front-phone {
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .front-phone .phone-icon {
            font-size: 10px;
        }
        
        /* === BACK === */
        .card-back {
            background: #E20074;
            display: flex;
            padding: 14px 16px;
            gap: 12px;
        }
        
        .back-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        
        .back-logo {
            text-align: center;
            color: white;
        }
        
        .back-logo .t-icon {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
        }
        
        .back-logo .fiber-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: -2px;
        }
        
        .qr-container {
            background: white;
            border-radius: 6px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qr-container canvas {
            display: block;
        }
        
        .back-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }
        
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
        }
        
        .benefit-check {
            color: white;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }
        
        .benefit-text {
            font-size: 10px;
            font-weight: 600;
        }
        
        .back-tmobile-watermark {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: rgba(255,255,255,0.3);
            font-size: 8px;
            font-weight: 600;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
                gap: 20px;
            }
            .card {
                box-shadow: none;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <!-- FRONT -->
    <div class="card card-front">
        <div class="photo-circle">
            <img src="/Users/calebdicken/Clearview-Sales-Co/05-Business-Cards/headshots/piers_headshot.jpg" alt="Piers Rodd">
        </div>
        <div class="front-info">
            <div class="tmobile-text"><span class="t-logo">T</span> Mobile</div>
            <div class="front-name">Piers</div>
            <div class="front-title">Fiber Territory Manager</div>
            <div class="front-phone">
                <span class="phone-icon">📞</span>
                <span>319-855-3188</span>
            </div>
        </div>
    </div>
    
    <!-- BACK -->
    <div class="card card-back">
        <div class="back-left">
            <div class="back-logo">
                <div class="t-icon">T</div>
                <div class="fiber-text">Fiber</div>
            </div>
            <div class="qr-container" id="qrcode"></div>
        </div>
        <div class="back-right">
            <div class="benefit-item">
                <span class="benefit-check">✓</span>
                <span class="benefit-text">Fiber-Fast Internet</span>
            </div>
            <div class="benefit-item">
                <span class="benefit-check">✓</span>
                <span class="benefit-text">Symmetrical Speeds</span>
            </div>
            <div class="benefit-item">
                <span class="benefit-check">✓</span>
                <span class="benefit-text">Professional Install</span>
            </div>
            <div class="benefit-item">
                <span class="benefit-check">✓</span>
                <span class="benefit-text">Reliable Home WiFi</span>
            </div>
        </div>
        <span class="back-tmobile-watermark">T Mobile</span>
    </div>
    
    <script>
        const vCardData = `BEGIN:VCARD
VERSION:3.0
N:Rodd;Piers;;;
FN:Piers Rodd
ORG:T-Mobile;T-Fiber
TITLE:T-Fiber Territory Manager
TEL;TYPE=CELL:319-855-3188
EMAIL:piers.rodd1@t-mobile.com
URL:https://www.t-mobile.com/fiber
END:VCARD`;

        QRCode.toCanvas(document.createElement('canvas'), vCardData, {
            width: 80,
            margin: 0,
            color: { dark: '#000000', light: '#FFFFFF' }
        }, function(error, canvas) {
            if (!error) {
                document.getElementById('qrcode').appendChild(canvas);
            }
        });
    </script>
</body>
</html>
