<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>T-Mobile Business Card — Caleb</title>
    <script src="../scripts/qrcode.min.js"></script>
    <style>
        @page {
            size: 3.5in 2.25in;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        html,
        body {
            width: 3.5in;
            background: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .card {
            width: 3.5in;
            height: 2.25in;
            position: relative;
            overflow: hidden;
            page-break-after: always;
            break-after: page;
        }

        .card:last-child {
            page-break-after: avoid;
            break-after: avoid;
        }

        /* FRONT */
        .front {
            background: #E20074;
            display: flex;
            align-items: center;
        }

        .front-left {
            width: 40%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 14px;
        }

        .headshot-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.95);
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .headshot-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .front-right {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 14px 16px 14px 12px;
            gap: 2px;
        }

        .tmobile-logo-front {
            margin-bottom: 1px;
        }

        .tmobile-logo-front img {
            height: 26px;
            width: auto;
            display: block;
        }

        .name {
            color: #fff;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.05;
        }

        .title-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .phone-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }

        .phone-icon-svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .phone-number {
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* BACK */
        .back {
            background: linear-gradient(135deg, #E20074 0%, #B8005D 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px 8px;
        }

        .scan-title {
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .back-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .qr-container {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .qr-container canvas {
            display: block;
        }

        .benefits {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .benefit {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
        }

        .check-icon {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .check-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tmobile-logo-back {
            position: absolute;
            bottom: 6px;
            right: 12px;
        }

        .tmobile-logo-back img {
            height: 14px;
            width: auto;
            display: block;
            opacity: 0.4;
        }
    </style>
</head>

<body>
    <div class="card front">
        <div class="front-left">
            <div class="headshot-ring"><img src="../headshots/caleb_headshot.jpg" alt="Caleb"></div>
        </div>
        <div class="front-right">
            <div class="tmobile-logo-front"><img src="../assets/tmobile_logo_white_clean.svg" alt="T-Mobile"></div>
            <div class="name">Caleb</div>
            <div class="title-text">Fiber Territory Manager</div>
            <div class="phone-row">
                <svg class="phone-icon-svg" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"
                        fill="white" />
                </svg>
                <span class="phone-number">515-707-9550</span>
            </div>
        </div>
    </div>
    <div class="card back">
        <div class="scan-title"><img src="../assets/tfiber_logo_white.svg" alt="T-Fiber"
                style="height: 60px; width: auto; display: block; margin: 0 auto;"></div>
        <div class="back-content">
            <div class="qr-container" id="qrcode"></div>
            <div class="benefits">
                <div class="benefit">
                    <div class="check-icon"><svg viewBox="0 0 12 12" fill="none">
                            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg></div>Fiber-Fast Internet
                </div>
                <div class="benefit">
                    <div class="check-icon"><svg viewBox="0 0 12 12" fill="none">
                            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg></div>Symmetrical Speeds
                </div>
                <div class="benefit">
                    <div class="check-icon"><svg viewBox="0 0 12 12" fill="none">
                            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg></div>Professional Install
                </div>
                <div class="benefit">
                    <div class="check-icon"><svg viewBox="0 0 12 12" fill="none">
                            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg></div>Reliable Home WiFi
                </div>
            </div>
        </div>
        <div class="tmobile-logo-back"><img src="../assets/tmobile_logo_white_clean.svg" alt="T-Mobile"></div>
    </div>
    <script>
        const vCardData = `BEGIN:VCARD
VERSION:3.0
N:Dicken;Caleb;;;
FN:Caleb Dicken
ORG:T-Mobile;T-Fiber
TITLE:T-Fiber Territory Manager
TEL;TYPE=CELL:515-707-9550
EMAIL:calebtd8702@gmail.com
URL:https://www.t-mobile.com/fiber
END:VCARD`;

        QRCode.toCanvas(document.createElement('canvas'), vCardData, {
            width: 80,
            margin: 0,
            color: { dark: '#000000', light: '#FFFFFF' }
        }, function(error, canvas) {
            if (!error) {
                document.getElementById('qrcode').appendChild(canvas);
            }
        });
    </script>
</body>

</html>
